name: Sync Fatture Aruba

on:
  # Automatico: 1° di ogni mese alle 6:00 UTC (8:00 Roma)
  schedule:
    - cron: '0 6 1 * *'
  # Manuale: dal tab Actions su GitHub, click "Run workflow"
  workflow_dispatch:
    inputs:
      mese:
        description: 'Periodo da scaricare'
        default: 'tutti'
        type: choice
        options:
          - tutti
          - corrente
          - precedente

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install playwright xlrd requests
          playwright install chromium

      - name: Run scraper + push Supabase
        env:
          ARUBA_USER: ${{ secrets.ARUBA_USER }}
          ARUBA_PASS: ${{ secrets.ARUBA_PASS }}
          SB_COORD_EMAIL: ${{ secrets.SB_COORD_EMAIL }}
          SB_COORD_PASS: ${{ secrets.SB_COORD_PASS }}
          MESE: ${{ github.event.inputs.mese || 'tutti' }}
        run: python scripts/scraper_aruba_gh.py --mese $MESE

      - name: Upload XLS artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fatture-xls
          path: _aruba_download/*.xls
          retention-days: 30
